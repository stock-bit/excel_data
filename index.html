<!DOCTYPE html>
<html>
<head>
  <title>Excel Lookup</title>
</head>
<body>

<h2>Search Data</h2>

<input type="number" id="input1" placeholder="Enter value 1">
<input type="number" id="input2" placeholder="Enter value 2">
<button onclick="searchData()">Search</button>

<h3 id="result"></h3>


<script>
let dataMap = {};

fetch('website.csv')
  .then(res => res.text())
  .then(text => {

    // Handle Windows + Linux line breaks
    const rows = text.trim().split(/\r?\n/);

    for (let i = 1; i < rows.length; i++) { // skip header
      let cols = rows[i].split(',');

      if (cols.length < 3) continue;

      let booth = cols[0].trim();
      let srno = cols[1].trim();
      let ward = cols[2].trim();

      let key = booth + "-" + srno;

      dataMap[key] = ward;
    }

    console.log("Loaded:", Object.keys(dataMap).length);
    console.log("Test key 123-1:", dataMap["123-1"]); // DEBUG
  });

function searchData() {
  let val1 = document.getElementById('input1').value.trim();
  let val2 = document.getElementById('input2').value.trim();

  let key = val1 + "-" + val2;

  if (dataMap[key]) {
    document.getElementById('result').innerText = "Ward: " + dataMap[key];
  } else {
    document.getElementById('result').innerText = "No data found";
  }
}
</script>

</body>
</html>
